<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arshad - Personal Info</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .bio-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #e94560;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .name {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
    }

    .title {
      color: #e94560;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
    }

    .quote-section {
      background: rgba(233, 69, 96, 0.1);
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }

    .quote {
      color: #cccccc;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .quote::before {
      content: '"';
      color: #e94560;
      font-size: 1.5rem;
    }

    .quote::after {
      content: '"';
      color: #e94560;
      font-size: 1.5rem;
    }

    .quote-author {
      color: #888;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .refresh-btn {
      background: linear-gradient(135deg, #e94560, #c73659);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 15px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .refresh-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
    }

    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: #e94560;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="bio-image" id="bioImage" src="https://images.pexels.com/photos/1693095/pexels-photo-1693095.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Bio Image">
    <h1 class="name">Arshad</h1>
    <p class="title">Developer | Creator</p>

    <div class="quote-section">
      <p class="quote" id="quoteText"></p>
      <p class="quote-author" id="quoteAuthor"></p>
    </div>

    <button class="refresh-btn" onclick="newQuote()">New Quote</button>

    <div class="social-links">

      </a>
      <a href="#" class="social-link" title="Twitter">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
      </a>
      <a href="#" class="social-link" title="LinkedIn">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.472-.881 1.628-1.811 3.352-1.811 3.582 0 4.244 2.354 4.244 5.415v6.287zM5.337 7.433c-1.144 0-2.063-.892-2.063-1.99 0-1.098.92-1.99 2.063-1.99 1.143 0 2.063.892 2.063 1.99 0 1.098-.92 1.99-2.063 1.99zm1.776 13.019H3.56V9h3.553v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
    </div>
  </div>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      { text: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" }
    ];

    function newQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      const quote = quotes[randomIndex];
      document.getElementById('quoteText').textContent = quote.text;
      document.getElementById('quoteAuthor').textContent = '- ' + quote.author;
    }

    // Initial quote on page load
    window.onload = newQuote;
  </script>
</body>
</html>
