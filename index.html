<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arshad - Developer & Creator | Personal Portfolio</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <!-- SEO Meta Tags -->
  <meta name="description" content="Arshad - Developer and Creator. Personal portfolio showcasing innovative projects, creative solutions, and professional expertise.">
  <meta name="keywords" content="Arshad, developer, creator, portfolio, web developer, programmer, software engineer, coding, tech">
  <meta name="author" content="Arshad">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://arshad.dev/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://arshad.dev/">
  <meta property="og:title" content="Arshad - Developer & Creator">
  <meta property="og:description" content="Personal portfolio of Arshad - Developer and Creator showcasing innovative projects and creative solutions.">
  <meta property="og:image" content="https://images.pexels.com/photos/1693095/pexels-photo-1693095.jpeg?auto=compress&cs=tinysrgb&w=1200">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://arshad.dev/">
  <meta name="twitter:title" content="Arshad - Developer & Creator">
  <meta name="twitter:description" content="Personal portfolio of Arshad - Developer and Creator showcasing innovative projects and creative solutions.">
  <meta name="twitter:image" content="https://images.pexels.com/photos/1693095/pexels-photo-1693095.jpeg?auto=compress&cs=tinysrgb&w=1200">

  <!-- Structured Data / JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Arshad",
    "jobTitle": "Developer",
    "description": "Developer and Creator passionate about building innovative solutions",
    "url": "https://arshad.dev",
    "image": "https://images.pexels.com/photos/1693095/pexels-photo-1693095.jpeg?auto=compress&cs=tinysrgb&w=400",
    "sameAs": []
  }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Fira Code', 'Courier New', monospace;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .terminal {
      background: #1a1a1a;
      border-radius: 10px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #333;
    }

    .terminal-header {
      background: #2d2d2d;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #333;
    }

    .terminal-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .btn-close { background: #ff5f57; }
    .btn-minimize { background: #febc2e; }
    .btn-maximize { background: #28c840; }

    .terminal-title {
      color: #888;
      font-size: 0.85rem;
      margin-left: 10px;
    }

    .terminal-body {
      padding: 20px;
      color: #00ff00;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .line {
      margin-bottom: 5px;
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    .line:nth-child(1) { animation-delay: 0.1s; }
    .line:nth-child(2) { animation-delay: 0.2s; }
    .line:nth-child(3) { animation-delay: 0.3s; }
    .line:nth-child(4) { animation-delay: 0.4s; }
    .line:nth-child(5) { animation-delay: 0.5s; }
    .line:nth-child(6) { animation-delay: 0.6s; }
    .line:nth-child(7) { animation-delay: 0.7s; }
    .line:nth-child(8) { animation-delay: 0.8s; }
    .line:nth-child(9) { animation-delay: 0.9s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .prompt {
      color: #00ff00;
    }

    .command {
      color: #ffffff;
    }

    .comment {
      color: #686868;
    }

    .output {
      color: #00ff00;
      padding-left: 20px;
    }

    .highlight {
      color: #00d4ff;
    }

    .success {
      color: #00ff00;
    }

    .warning {
      color: #ffff00;
    }

    .error {
      color: #ff5555;
    }

    .bio-section {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      margin: 15px 0;
      padding: 15px;
      border: 1px solid #333;
      background: rgba(0, 255, 0, 0.03);
      border-radius: 5px;
    }

    .bio-image {
      width: 100px;
      height: 100px;
      border-radius: 5px;
      object-fit: cover;
      border: 2px solid #00ff00;
      flex-shrink: 0;
    }

    .bio-content {
      flex: 1;
    }

    .bio-content .line {
      margin-bottom: 3px;
    }

    .quote-box {
      margin: 15px 0;
      padding: 15px;
      border-left: 3px solid #00ff00;
      background: rgba(0, 255, 0, 0.05);
    }

    .quote-text {
      color: #ffffff;
      font-style: italic;
    }

    .quote-author {
      color: #686868;
      margin-top: 8px;
      font-size: 0.85rem;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background: #00ff00;
      animation: blink 1s infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .action-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 8px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s ease;
    }

    .refresh-btn:hover {
      background: #00ff00;
      color: #1a1a1a;
    }

    .divider {
      color: #333;
      margin: 10px 0;
    }

    .ascii-art {
      color: #00ff00;
      font-size: 0.6rem;
      line-height: 1.2;
      margin: 15px 0;
      white-space: pre;
    }

    .info-table {
      border-collapse: collapse;
      margin: 10px 0;
    }

    .info-table td {
      padding: 3px 15px 3px 0;
    }

    .info-table .label {
      color: #686868;
    }

    .info-table .value {
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <main role="main">
    <article class="terminal" aria-label="Personal profile terminal">
      <header class="terminal-header" aria-label="Terminal window controls">
        <div class="terminal-btn btn-close" aria-hidden="true"></div>
        <div class="terminal-btn btn-minimize" aria-hidden="true"></div>
        <div class="terminal-btn btn-maximize" aria-hidden="true"></div>
        <span class="terminal-title">arshad@terminal:~</span>
      </header>
      <section class="terminal-body" aria-label="Profile information">
        <div class="line"><span class="prompt">$</span> <span class="command">whoami</span></div>
        <div class="line output">arshad</div>

        <div class="line"><span class="prompt">$</span> <span class="command">cat profile.json</span></div>
        <div class="line output">{</div>
        <div class="line output">&nbsp;&nbsp;"name": "<span class="highlight">Arshad</span>",</div>
        <div class="line output">&nbsp;&nbsp;"role": "<span class="highlight">Developer | Creator</span>",</div>
        <div class="line output">&nbsp;&nbsp;"status": "<span class="success">Online</span>"</div>
        <div class="line output">}</div>

        <div class="line"><span class="prompt">$</span> <span class="command">display --bio</span></div>
        <figure class="bio-section" aria-label="Profile photo and details">
          <img class="bio-image" src="https://images.pexels.com/photos/1693095/pexels-photo-1693095.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Arshad profile photo" loading="lazy" width="100" height="100">
          <figcaption class="bio-content">
            <table class="info-table" aria-label="Profile details">
              <tr><td class="label">NAME:</td><td class="value">Arshad</td></tr>
              <tr><td class="label"> ROLE:</td><td class="value">Developer</td></tr>
              <tr><td class="label"> STATUS:</td><td class="value">Active</td></tr>
              <tr><td class="label"> MODE:</td><td class="value">Creative</td></tr>
            </table>
          </figcaption>
        </figure>

        <div class="line"><span class="prompt">$</span> <span class="command">fortune</span></div>
        <blockquote class="quote-box" aria-label="Inspirational quote">
          <p class="quote-text" id="quoteText"></p>
          <cite class="quote-author" id="quoteAuthor"></cite>
        </blockquote>

        <div class="action-line">
          <span class="prompt">$</span>
          <button class="refresh-btn" onclick="newQuote()" aria-label="Get new random quote">./next_quote.sh</button>
          <span class="cursor" aria-hidden="true"></span>
        </div>
      </section>
    </article>
  </main>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      { text: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" }
    ];

    function newQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      const quote = quotes[randomIndex];
      document.getElementById('quoteText').textContent = quote.text;
      document.getElementById('quoteAuthor').textContent = '-- ' + quote.author;
    }

    window.onload = newQuote;
  </script>
</body>
</html>
