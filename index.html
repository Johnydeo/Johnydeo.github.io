<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad — Digital Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #a8ff3e;
            --font-family: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow: hidden; /* Clean viewport */
            height: 100vh;
            width: 100vw;
        }

        /* Animated Grain & Gradient Background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% -20%, #1a1a1a, transparent),
                radial-gradient(circle at 0% 100%, rgba(168, 255, 62, 0.05), transparent);
        }

        .bg-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 40px;
            z-index: 10;
        }

        .logo {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .hero-container {
            max-width: 900px;
        }

        h1 {
            font-size: clamp(32px, 6vw, 72px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
            background: linear-gradient(to bottom, #fff 40%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        p {
            font-size: clamp(16px, 2vw, 20px);
            color: var(--text-muted);
            margin-bottom: 48px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .btn-contact {
            display: inline-block;
            background-color: var(--accent);
            color: #000;
            padding: 18px 40px;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
            border: 1px solid var(--accent);
        }

        .btn-contact:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 30px rgba(168, 255, 62, 0.2);
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle ambient glow movement */
        @keyframes ambient {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(2%, 2%); }
        }

        @media (max-width: 600px) {
            header { padding: 30px; }
            h1 { line-height: 1.2; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <header>
        <div class="logo">ARSHAD.</div>
    </header>

    <main>
        <div class="hero-container">
            <h1>Hi, I'm Arshad. <br> Welcome to my small place in this big planet.</h1>
            <p>Based in India, I host everything that comes to my mind right here.</p>
            <a href="mailto:dummyarshad@proton.me" class="btn-contact">Contact Me</a>
        </div>
    </main>

    <script>
        // Ambient background movement
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.bg-overlay').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        console.log("Arshad's Premium Portfolio Loaded.");
    </script>
</body>
</html>
